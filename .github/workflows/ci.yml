name: CI (Windows)

# Windows-only matrix (docs/plan/00 §2 결정 — macOS / Linux 는 v1.x 에서)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-test:
    name: Rust unit tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify git CLI present + version
        run: git --version

      - name: cargo fmt --check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test --all-features --no-fail-fast

  web-test:
    name: Vue typecheck + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install
        working-directory: ./

      - name: Type check
        working-directory: apps/desktop
        run: bun run typecheck

      - name: Vitest
        working-directory: apps/desktop
        run: bun run test

  tauri-build:
    name: Tauri release build (Windows MSI)
    needs: [rust-test, web-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install bun deps
        run: bun install

      - name: Tauri build
        run: bun run tauri:build
        env:
          # OV 코드 서명은 v0.x 에서는 옵션. 없으면 unsigned MSI.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: git-fried-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
