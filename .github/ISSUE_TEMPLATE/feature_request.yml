name: 💡 Feature request
description: 새 기능 또는 개선 제안
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        먼저 [GitHub Discussions](https://github.com/tgkim/git-fried/discussions) Ideas 카테고리에서 사전 논의를 권장합니다.

        **명시적 거부 catalog** ([`docs/plan/01 §5`](https://github.com/tgkim/git-fried/blob/main/docs/plan/01-why-and-positioning.md)):
        - Cloud Workspace / Cloud Patches / Browser Extension / GitLens 통합
        - 자체 LLM 호스팅 / BYOK API key router
        - Issue 트래커 풀 통합 (Jira/Trello/Linear)
        - 모바일 앱 / 웹앱

  - type: textarea
    id: scenario
    attributes:
      label: 사용 시나리오
      description: 어떤 상황에서, 어떤 워크플로우로, 어떤 가치를 얻나
    validations:
      required: true

  - type: textarea
    id: gitkraken
    attributes:
      label: GitKraken / 다른 툴과의 비교 (선택)
      description: 같은 기능이 GitKraken / Tower / Fork / Sourcetree 등에 있다면 어디서 찾을 수 있는지

  - type: textarea
    id: design
    attributes:
      label: 제안하는 UX / 진입점 (선택)
      description: |
        - Command Palette 명령? 단축키? 우클릭 메뉴? 사이드바?
        - GitKraken benchmark catalog ([`docs/plan/11`](https://github.com/tgkim/git-fried/blob/main/docs/plan/11-gitkraken-benchmark.md)) 의 §번호 참조 가능
