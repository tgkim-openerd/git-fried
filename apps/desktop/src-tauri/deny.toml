# cargo-deny — 공급망 advisory(RUSTSEC) baseline (plan #45 E).
#
# CI: .github/workflows/ci.yml 의 supply-chain job 이 cargo-deny-action 으로 실행
#     (check: advisories bans sources — licenses 는 별도 관심사라 게이트에서 제외).
# 로컬: cargo-deny 소스 빌드는 newer toolchain(2024 edition) 필요. 또한 cargo-deny 가 내부적으로
#   `cargo metadata` 를 호출하는데, PATH 의 cargo 가 구버전(<1.85)이면 2024-edition transitive
#   crate 파싱에 실패한다. → prebuilt 바이너리 + rustup stable cargo 로 실행:
#     gh release download --repo EmbarkStudios/cargo-deny --pattern '*x86_64-pc-windows-msvc*'
#     CARGO="$(rustup which --toolchain stable cargo)" cargo-deny \
#       --manifest-path apps/desktop/src-tauri/Cargo.toml check advisories bans sources

[advisories]
yanked = "deny"
unmaintained = "workspace"
# unmaintained 는 workspace 직접 의존만 검사 (cargo-deny 0.19 v2). 실측 결과 검출된
# unmaintained 20건이 전부 통제 불가한 transitive (Windows 앱이 tauri 통해 끄는 Linux
# gtk-rs 바인딩 10 + unic/async-std/fxhash 등) — 보안 취약점 아닌 노이즈라 게이트 제외.
# 본 게이트의 목적은 *취약점(vulnerability)* + yanked 검출 (그 둘은 deny 유지).
# ignore 없음 — RUSTSEC-2023-0071(rsa Marvin)은 cargo-deny 실측상 그래프에 부재
# ("no crate matched"). sqlx default-features=false + sqlite-only 라 mysql driver(rsa)가
# 미컴파일되기 때문. 따라서 ignore 불필요 (cargo-deny 0.19 는 미매칭 ignore 를 error 처리).
# 만약 향후 의존성 변경으로 rsa 가 실제 그래프에 유입되면 본 게이트가 정상적으로 vulnerability
# 를 flag 하도록 의도적으로 ignore 하지 않는다.
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"

# licenses 는 CI 게이트에서 제외 (advisories/bans/sources 만 enforce). allowlist 는
# 로컬 full check 시 참고용 — 유지보수 부담 회피 (plan #45 E 는 RUSTSEC 모니터링 목적).
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
]
confidence-threshold = 0.8
